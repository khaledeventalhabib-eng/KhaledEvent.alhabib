<style>
  :root{
    --beige:#F4ECDD; --beige-deep:#E9DBC1; --card:#FFFCF6;
    --red:#A3201E; --red-deep:#711512; --ink:#2B211A; --muted:#8A7A64; --line:#E3D6BC;
    --ok:#2F6B3C; --ok-bg:#EAF3EA; --late:#8F1E1B; --late-bg:#F7E7E2; --warn:#B4691E; --warn-bg:#FCEFDD;
  }
  *{box-sizing:border-box;}
  body{margin:0; background:var(--beige); color:var(--ink); font-family:'Inter',sans-serif; min-height:100vh;}
  body.lang-ar{font-family:'Cairo',sans-serif;}
  body.lang-ar h1, body.lang-ar h2{font-family:'Cairo',sans-serif;}
  .wrap{max-width:640px; margin:0 auto; padding:20px 16px 60px;}
  .brand{display:flex; align-items:flex-start; gap:12px; margin-bottom:20px; padding-bottom:16px; border-bottom:2px solid var(--beige-deep);}
  .brand .mark{width:44px;height:44px;border-radius:10px;background:var(--red-deep);display:flex;align-items:center;justify-content:center;color:var(--beige);font-weight:900;font-size:20px;flex-shrink:0;}
  .brand .text{flex:1;}
  .brand h1{font-family:'Fraunces',serif; font-size:17px;margin:0;font-weight:700;color:var(--red-deep); line-height:1.35;}
  .brand p{margin:3px 0 0;font-size:11.5px;color:var(--muted);}
  .lang-toggle{flex-shrink:0; background:var(--card); border:1.5px solid var(--red-deep); color:var(--red-deep); font-weight:700; font-size:12px; padding:7px 12px; border-radius:20px; cursor:pointer; font-family:'Inter',sans-serif;}
  .tabs{display:flex;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:4px;margin-bottom:16px;}
  .tab{flex:1;text-align:center;padding:10px 6px;border-radius:9px;font-weight:600;font-size:13.5px;color:var(--muted);cursor:pointer;user-select:none;transition:.15s;}
  .tab.active{background:var(--red);color:#fff;}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;margin-bottom:14px; box-shadow:0 1px 3px rgba(0,0,0,.04);}
  .card h2{font-family:'Fraunces',serif; font-size:15px;margin:0 0 14px;color:var(--red-deep);display:flex;align-items:center;gap:8px;font-weight:700;}
  .card h2 .n{background:var(--red);color:#fff;width:20px;height:20px;border-radius:5px;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-family:'IBM Plex Mono',monospace;}
  label{display:block;font-size:12.5px;font-weight:600;color:var(--muted);margin:12px 0 5px;}
  input, select{width:100%; padding:11px 12px; border:1.5px solid var(--line); border-radius:9px; font-family:inherit; font-size:14px; background:#fffdf9; color:var(--ink);}
  input:focus, select:focus{outline:none; border-color:var(--red);}
  .row2{display:flex;gap:10px;} .row2>div{flex:1;}
  .row3{display:flex;gap:8px;} .row3>div{flex:1; text-align:center;}
  button{font-family:inherit; font-weight:700; font-size:14px; border:none; border-radius:9px; padding:12px 16px; cursor:pointer; transition:.15s; width:100%;}
  .btn-main{background:var(--red-deep); color:#fff; margin-top:16px;}
  .btn-main:active{transform:scale(.98);}
  .btn-main:disabled{background:#c9beac;cursor:not-allowed;}
  .btn-secondary{background:var(--beige); color:var(--red-deep); border:1.5px solid var(--red); margin-top:8px;}
  .btn-ghost{background:#fff; color:var(--red-deep); border:1.5px solid var(--red-deep); margin-top:8px;}
  .btn-locate{background:var(--beige); color:var(--red-deep); border:1.5px dashed var(--red); font-size:12.5px; padding:9px; margin-top:6px;}
  .btn-photo{background:var(--beige); color:var(--red-deep); border:1.5px solid var(--line); font-size:12.5px; padding:9px; margin-top:8px;}
  .status-box{margin-top:14px; padding:12px 14px; border-radius:10px; font-size:13px; line-height:1.7; display:none;}
  .status-box.show{display:block;}
  .status-ok{background:var(--ok-bg); color:var(--ok); border:1px solid #c9e0cb;}
  .status-late{background:var(--late-bg); color:var(--late); border:1px solid #ecc6be;}
  .status-err{background:#FBF0E3; color:#8a5a12; border:1px solid #eed9ae;}
  .rec{display:flex; justify-content:space-between; align-items:center; gap:10px; padding:11px 12px; border-radius:10px; margin-bottom:8px; font-size:12.5px; border:1px solid var(--line);}
  .rec.ok{background:var(--ok-bg);} .rec.late{background:var(--late-bg);}
  .rec.flagged{border:1.5px solid var(--warn); background:var(--warn-bg);}
  .rec .thumb{width:36px;height:36px;border-radius:8px;object-fit:cover;background:var(--beige-deep);flex-shrink:0;}
  .rec .name{font-weight:700;} .rec .meta{color:var(--muted);font-size:11px;margin-top:2px;}
  .rec .flag-note{color:var(--warn);font-size:10.5px;font-weight:700;margin-top:3px;}
  .badge{font-family:'IBM Plex Mono',monospace; font-size:11px; font-weight:600; padding:3px 8px; border-radius:20px; white-space:nowrap;}
  .badge.ok{background:var(--ok); color:#fff;} .badge.late{background:var(--late); color:#fff;}
  .link-box{display:flex; gap:8px; margin-top:10px;}
  .link-box input{flex:1; font-family:'IBM Plex Mono',monospace; font-size:11.5px; direction:ltr; text-align:left;}
  .link-box button{width:auto; padding:10px 14px; font-size:12.5px;}
  .event-pick{padding:12px; border:1.5px solid var(--line); border-radius:10px; margin-bottom:8px; cursor:pointer; background:#fffdf9;}
  .event-pick:hover{border-color:var(--red);}
  .event-pick b{font-family:'Fraunces',serif; color:var(--red-deep);}
  .lang-ar .event-pick b{font-family:'Cairo',sans-serif;}
  .event-pick .meta{font-size:11.5px; color:var(--muted); margin-top:3px;}
  .empty{text-align:center; padding:24px 10px; color:var(--muted); font-size:13px;}
  .small{font-size:11px; color:var(--muted); margin-top:8px; line-height:1.6;}
  .pin-gate{display:flex; gap:8px; align-items:center;}
  .photo-preview{margin-top:10px; width:100px; height:100px; border-radius:10px; object-fit:cover; border:1.5px solid var(--line); display:none;}
  .stat-box{background:var(--beige); border-radius:10px; padding:10px 6px;}
  .stat-box .num{font-family:'IBM Plex Mono',monospace; font-size:20px; font-weight:700; color:var(--red-deep);}
  .stat-box .lbl{font-size:10.5px; color:var(--muted); margin-top:2px;}
  .qr-wrap{text-align:center; margin-top:14px; padding:14px; background:var(--beige); border-radius:12px;}
  .qr-wrap img{width:180px; height:180px; border-radius:8px; background:#fff; padding:8px;}
  #printFlyer{display:none;}
  @media print{
    body *{visibility:hidden;}
    #printFlyer, #printFlyer *{visibility:visible;}
    #printFlyer{display:block; position:absolute; top:0; left:0; width:100%; text-align:center; padding:40px;}
    #printFlyer img{width:320px; height:320px; margin:20px auto;}
  }
</style>

const initialEventId = "<?= initialEventId ?>";

function callServer(fnName, args){
  return new Promise((resolve, reject)=>{
    google.script.run
      .withSuccessHandler(function(res){ resolve(res); })
      .withFailureHandler(function(err){ reject(err); })
      [fnName].apply(null, args || []);
  });
}

function getDeviceId(){
  try{
    let id = localStorage.getItem('attendance_device_id');
    if(!id){
      id = 'dev-' + Date.now().toString(36) + '-' + Math.random().toString(36).slice(2,10);
      localStorage.setItem('attendance_device_id', id);
    }
    return id;
  }catch(e){
    return 'dev-unknown';
  }
}

function haversine(lat1, lon1, lat2, lon2){
  const R = 6371000;
  const toRad = d => d * Math.PI/180;
  const dLat = toRad(lat2-lat1), dLon = toRad(lon2-lon1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function onPhotoSelected(evt){
  const file = evt.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e){
    const img = new Image();
    img.onload = function(){
      const canvas = document.createElement('canvas');
      const size = 160;
      canvas.width = size; canvas.height = size;
      const ctx = canvas.getContext('2d');
      const scale = Math.max(size/img.width, size/img.height);
      const w = img.width*scale, h = img.height*scale;
      ctx.drawImage(img, (size-w)/2, (size-h)/2, w, h);
      selectedPhotoBase64 = canvas.toDataURL('image/jpeg', 0.45);
      const prev = document.getElementById('photoPreview');
      prev.src = selectedPhotoBase64;
      prev.style.display = 'block';
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

async function doCheckin(){
  const d = I18N[currentLang];
  const name = document.getElementById('staffName').value.trim();
  const id = document.getElementById('staffId').value.trim();
  const venueCodeEntered = document.getElementById('venueCodeInput').value.trim();
  const box = document.getElementById('checkinStatus');
  const btn = document.getElementById('btnCheckin');
  box.className = 'status-box show';

  if(!name || !id){ box.className='status-box show status-err'; box.innerHTML = d.fillNameId; return; }
  if(!selectedPhotoBase64){ box.className='status-box show status-err'; box.innerHTML = d.photoRequired; return; }
  if(!currentEventId){ box.className='status-box show status-err'; box.innerHTML = d.noEventSelected; return; }

  let cfg;
  try{ cfg = await callServer('getEvent', [currentEventId]); }
  catch(e){ box.className='status-box show status-err'; box.innerHTML = d.networkErr; return; }
  if(!cfg){ box.className='status-box show status-err'; box.innerHTML = d.eventNotFound; return; }

  if(cfg.venueCode){
    if(venueCodeEntered.toLowerCase() !== String(cfg.venueCode).toLowerCase().trim()){
      box.className='status-box show status-err'; box.innerHTML = d.venueCodeWrong; return;
    }
  }

  const now0 = new Date();
  const start0 = new Date(cfg.startTime);
  const opensAt = new Date(start0.getTime() - 60*60000);
  const closesAt = new Date(start0.getTime() + 6*60*60000);
  if(now0 < opensAt){ box.className='status-box show status-err'; box.innerHTML = d.tooEarly; return; }
  if(now0 > closesAt){ box.className='status-box show status-err'; box.innerHTML = d.tooLate; return; }

  try{
    const existing = await callServer('checkExisting', [currentEventId, id]);
    if(existing && existing.exists){
      box.className='status-box show status-ok';
      const st = existing.status === 'ok' ? d.onTimeWord : d.lateWord(existing.lateMinutes);
      box.innerHTML = d.alreadyIn(new Date(existing.timestamp).toLocaleTimeString(d.locale), st);
      return;
    }
  }catch(e){}

  btn.disabled = true;
  btn.textContent = d.verifyingLoc;
  if(!navigator.geolocation){
    box.className='status-box show status-err'; box.innerHTML = d.noGeoSupport;
    btn.disabled=false; btn.textContent = d.checkInNowBtn; return;
  }

  navigator.geolocation.getCurrentPosition(async pos=>{
    const dist = haversine(pos.coords.latitude, pos.coords.longitude, cfg.lat, cfg.lng);
    if(dist > cfg.radius){
      box.className='status-box show status-err'; box.innerHTML = d.outsideVenue(Math.round(dist));
      btn.disabled=false; btn.textContent = d.checkInNowBtn; return;
    }
    const now = new Date();
    const start = new Date(cfg.startTime);
    const deadline = new Date(start.getTime() + (cfg.graceMinutes||0)*60000);
    const isLate = now > deadline;
    const lateMinutes = isLate ? Math.round((now-deadline)/60000) : 0;

    try{
      const res = await callServer('doCheckin', [{
        eventId: currentEventId, nationalId: id, name,
        distance: Math.round(dist), timestamp: now.toISOString(),
        status: isLate ? 'late':'ok', lateMinutes, photo: selectedPhotoBase64,
        deviceId: getDeviceId()
      }]);
      if(res && res.alreadyExists){
        box.className='status-box show status-ok';
        const st = res.existing.status === 'ok' ? d.onTimeWord : d.lateWord(res.existing.lateMinutes);
        box.innerHTML = d.alreadyIn(new Date(res.existing.timestamp).toLocaleTimeString(d.locale), st);
      } else {
        box.className = 'status-box show ' + (isLate ? 'status-late' : 'status-ok');
        box.innerHTML = isLate ? d.savedLate(lateMinutes) : d.savedOk;
      }
    }catch(e){
      box.className='status-box show status-err'; box.innerHTML = d.saveFail;
    }
    btn.disabled=false; btn.textContent = d.checkInNowBtn;
  }, err=>{
    box.className='status-box show status-err'; box.innerHTML = d.locFail;
    btn.disabled=false; btn.textContent = d.checkInNowBtn;
  }, {enableHighAccuracy:true, timeout:15000});
}

async function doCheckout(){
  const d = I18N[currentLang];
  const id = document.getElementById('staffId').value.trim();
  const box = document.getElementById('checkinStatus');
  box.className = 'status-box show';
  if(!id){ box.className='status-box show status-err'; box.innerHTML = d.needIdToCheckout; return; }
  if(!currentEventId){ box.className='status-box show status-err'; box.innerHTML = d.noEventSelected; return; }
  try{
    const res = await callServer('doCheckout', [currentEventId, id, new Date().toISOString()]);
    if(res && res.ok){
      box.className = 'status-box show status-ok';
      box.innerHTML = d.checkoutOk;
    } else if(res && res.alreadyCheckedOut){
      box.className = 'status-box show status-ok';
      box.innerHTML = d.checkoutAlready(new Date(res.checkoutTime).toLocaleTimeString(d.locale));
    } else if(res && res.notCheckedIn){
      box.className = 'status-box show status-err';
      box.innerHTML = d.checkoutNotIn;
    } else {
      box.className = 'status-box show status-err';
      box.innerHTML = d.checkoutFail;
    }
  }catch(e){
    box.className = 'status-box show status-err';
    box.innerHTML = d.checkoutFail;
  }
}

async function saveConfig(){

  const eventName = document.getElementById('cfgEventName').value.trim();
  const lat = parseFloat(document.getElementById('cfgLat').value);
  const lng = parseFloat(document.getElementById('cfgLng').value);
  const radius = parseInt(document.getElementById('cfgRadius').value);
  const startTime = document.getElementById('cfgStart').value;
  const endTime = document.getElementById('cfgEnd').value;
  const graceMinutes = parseInt(document.getElementById('cfgGrace').value || '0');
  const venueCode = document.getElementById('cfgVenueCode').value.trim();
  const box = document.getElementById('cfgStatus');
  box.className = 'status-box show';

  if(!eventName || isNaN(lat) || isNaN(lng) || !radius || !startTime){
    box.classList.add('status-err'); box.innerHTML = d.fillEventForm; return;
  }
  try{
    const res = await callServer('saveEvent', [{eventName, lat, lng, radius, startTime, graceMinutes, venueCode, endTime}]);
    box.classList.remove('status-err'); box.classList.add('status-ok');
    box.innerHTML = d.eventSaved;
    setTimeout(()=> openEventDetail(res.id, eventName), 400);
  }catch(e){
    box.classList.add('status-err'); box.innerHTML = d.saveFailGeneric;
  }
}

async function loadRecords(){
  const d = I18N[currentLang];
  if(!openEventId) return;
  const list = document.getElementById('recordsList');
  list.innerHTML = `<div class="empty">${d.loading}</div>`;
  try{
    const evCfg = await callServer('getEvent', [openEventId]);
    currentEventEndTime = evCfg && evCfg.endTime ? new Date(evCfg.endTime) : null;

    const records = await callServer('getRecords', [openEventId]);
    const total = records ? records.length : 0;
    const onTime = records ? records.filter(r=>r.status==='ok').length : 0;
    const late = total - onTime;
    const rate = total ? Math.round((onTime/total)*100) : 0;
    document.getElementById('statTotal').textContent = total;
    document.getElementById('statOnTime').textContent = onTime;
    document.getElementById('statLate').textContent = late;
    document.getElementById('statRate').textContent = rate + '%';

    if(!records || records.length===0){
      list.innerHTML = `<div class="empty">${d.noCheckins}</div>`;
      return;
    }
    records.sort((a,b)=> new Date(a.timestamp) - new Date(b.timestamp));
    window.__lastRecords = records;

    const deviceMap = {};
    records.forEach(r=>{
      if(!r.deviceId) return;
      if(!deviceMap[r.deviceId]) deviceMap[r.deviceId] = new Set();
      deviceMap[r.deviceId].add(r.id);
    });
    const flaggedDevices = new Set(Object.keys(deviceMap).filter(k => deviceMap[k].size > 1));
    const eventEnded = currentEventEndTime && new Date() > currentEventEndTime;

    list.innerHTML = records.map(r=>{
      const sharedDevice = r.deviceId && flaggedDevices.has(r.deviceId);
      let departureNote = '';
      let durationNote = '';
      if(r.checkoutTime){
        const inT = new Date(r.timestamp), outT = new Date(r.checkoutTime);
        const mins = Math.round((outT-inT)/60000);
        durationNote = `${d.checkedOutAt}: ${outT.toLocaleTimeString(d.locale)} · ${d.duration}: ${mins} min`;
        if(currentEventEndTime && outT < new Date(currentEventEndTime.getTime() - 15*60000)){
          departureNote = d.leftEarly;
        }
      } else if(eventEnded){
        departureNote = d.noCheckout;
      }
      const flagged = sharedDevice || departureNote;
      return `
      <div class="rec ${r.status==='ok'?'ok':'late'} ${flagged?'flagged':''}">
        <img class="thumb" src="${r.photo||''}">
        <div style="flex:1;">
          <div class="name">${r.name} <span style="font-weight:400;color:var(--muted);">#${r.id}</span></div>
          <div class="meta">${new Date(r.timestamp).toLocaleString(d.locale)} · ${r.distance} ${d.fromVenue}</div>
          ${durationNote ? `<div class="meta">${durationNote}</div>` : ''}
          ${sharedDevice ? `<div class="flag-note">${d.sharedDeviceWarning}</div>` : ''}
          ${departureNote ? `<div class="flag-note">${departureNote}</div>` : ''}
        </div>
        <span class="badge ${r.status==='ok'?'ok':'late'}">${r.status==='ok' ? d.badgeOnTime : d.badgeLate(r.lateMinutes)}</span>
      </div>
    `;}).join('');
  }catch(e){
    list.innerHTML = `<div class="empty">${d.networkErr}</div>`;
  }
}

function exportCSV(){
  const d = I18N[currentLang];
  const records = window.__lastRecords || [];
  if(records.length === 0){ alert(d.noExport); return; }
  let csv = 'National ID,Name,Timestamp,Status,Late Minutes,Distance (m),Checkout Time\n';
  records.forEach(r=>{
    csv += `${r.id},"${r.name}",${new Date(r.timestamp).toLocaleString(d.locale)},${r.status==='ok'?'On time':'Late'},${r.lateMinutes},${r.distance},${r.checkoutTime ? new Date(r.checkoutTime).toLocaleString(d.locale) : ''}\n`;
  });
  const blob = new Blob([csv], {type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'attendance-'+openEventId+'.csv'; a.click();
  URL.revokeObjectURL(url);
}

function exportExcel(){
  const records = window.__lastRecords || [];
  if(records.length === 0){ alert(I18N[currentLang].noExport); return; }

  const RED = '#A3201E', RED_DEEP='#711512', BEIGE='#F4ECDD', BEIGE_DEEP='#E9DBC1';
  const style = `
    body{font-family:Arial, sans-serif; direction:rtl;}
    table{border-collapse:collapse;}
    th{background:${RED}; color:#fff; padding:8px; text-align:center; font-weight:bold; border:1px solid ${RED_DEEP};}
    td{padding:6px 10px; text-align:center; border:1px solid ${BEIGE_DEEP};}
    .title{background:${RED_DEEP}; color:#fff; font-size:18px; font-weight:bold; padding:12px; text-align:center;}
    .subtitle{background:${BEIGE}; color:${RED_DEEP}; font-size:12px; padding:6px; text-align:center;}
    .even td{background:${BEIGE};}
    .odd td{background:#fff;}
  `;
  const deviceMap = {};
  records.forEach(r=>{
    if(!r.deviceId) return;
    if(!deviceMap[r.deviceId]) deviceMap[r.deviceId] = new Set();
    deviceMap[r.deviceId].add(r.id);
  });
  const flaggedDevices = new Set(Object.keys(deviceMap).filter(k => deviceMap[k].size > 1));

  let html = `<html><head><meta charset="UTF-8"><style>${style}</style></head><body><table>`;
  html += `<tr><td class="title" colspan="8">كشف حضور الفعاليات — مجموعة د. سليمان الحبيب جدة<br>Events Attendance Report — Dr. Sulaiman Al Habib Group Jeddah</td></tr>`;
  html += `<tr><td class="subtitle" colspan="8">${openEventName} — ${new Date().toLocaleDateString('en-GB')}</td></tr>`;
  html += `<tr><th>National ID<br>رقم الهوية</th><th>Name<br>الاسم</th><th>Check-in<br>الدخول</th><th>Status<br>الحالة</th><th>Late (min)<br>التأخير</th><th>Distance (m)<br>المسافة</th><th>Check-out<br>الخروج</th><th>Flag<br>ملاحظة</th></tr>`;
  records.forEach((r,i)=>{
    const flagged = r.deviceId && flaggedDevices.has(r.deviceId);
    html += `<tr class="${i%2?'even':'odd'}">
      <td>${r.id}</td><td>${r.name}</td><td>${new Date(r.timestamp).toLocaleString('en-GB')}</td>
      <td>${r.status==='ok'?'On time / في الوقت':'Late / متأخر'}</td><td>${r.lateMinutes}</td><td>${r.distance}</td>
      <td>${r.checkoutTime ? new Date(r.checkoutTime).toLocaleString('en-GB') : '—'}</td>
      <td>${flagged ? 'Shared device / جهاز مشترك' : ''}</td>
    </tr>`;
  });
  html += `</table></body></html>`;

  const blob = new Blob(["\uFEFF" + html], {type:'application/vnd.ms-excel'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'attendance-'+openEventId+'.xls'; a.click();
  URL.revokeObjectURL(url);
}

applyLanguage('en');
initCheckin();
